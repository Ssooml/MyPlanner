<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планер</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #6366f1;
            --border: #e0e0e0;
        }
        
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #f0f0f0;
            --primary: #818cf8;
            --border: #333333;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        .hidden { display: none !important; }

        .login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            background: var(--card);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .login-card h1 {
            margin: 0 0 20px;
            color: var(--primary);
            font-size: 32px;
        }

        .google-btn {
            background: white;
            color: #333;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .google-btn:hover { opacity: 0.9; }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-info span {
            font-weight: 600;
        }

        .header button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .setting {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle {
            width: 50px;
            height: 28px;
            background: var(--border);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle.active {
            background: var(--primary);
        }

        .toggle.active::after {
            left: 24px;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-top: 30px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-btn {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }

        .day-btn:hover { transform: translateY(-2px); }

        .day-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .day-btn small {
            display: block;
            font-size: 12px;
            opacity: 0.8;
        }

        .input-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input[type="text"],
        input[type="time"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="time"] {
            width: 120px;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .add-btn:hover { opacity: 0.9; }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .task {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .task input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .task.done .task-text {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .task-time {
            font-size: 12px;
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .task-del {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card h3 {
            margin: 0 0 15px;
            font-size: 16px;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: #10b981;
            transition: width 0.3s;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .streak-card {
            grid-column: 1 / -1;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            color: white;
            border: none;
        }

        .streak-card h3 {
            color: white;
            margin: 0 0 10px;
        }

        .streak-number {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .input-area {
                flex-direction: column;
            }

            input[type="time"] {
                width: 100%;
            }

            .days {
                grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .streak-card {
                grid-column: 1;
            }
        }
    </style>
</head>
<body data-theme="light">

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>📋 Планер</h1>
        <button class="google-btn" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" style="margin-right: 8px;">
            Войти через Google
        </button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>⚙️ Настройки</h2>
            <button class="close-btn" onclick="closeSettings()">✕</button>
        </div>

        <div class="setting">
            <span>Тёмная тема</span>
            <button class="toggle" id="themeToggle" onclick="toggleTheme()"></button>
        </div>

        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div class="header">
            <div class="user-info" onclick="openSettings()">
                <img id="userImg" src="">
                <span id="userName">Юзер</span>
            </div>
            <button onclick="toggleTheme()">🌙</button>
        </div>

        <div class="days" id="daysContainer"></div>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Задача...">
            <input type="time" id="timeInput">
            <button class="add-btn" onclick="addTask()">+</button>
        </div>

        <div class="tasks" id="tasksList"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>📊 Статистика</h3>
                <div class="progress">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="stat-row">
                    <span>Всего:</span>
                    <span id="totalCount">0</span>
                </div>
                <div class="stat-row">
                    <span>Выполнено:</span>
                    <span id="doneCount">0</span>
                </div>
            </div>

            <div class="stat-card">
                <h3>🔥 Серия</h3>
                <div style="font-size: 32px; font-weight: 700; text-align: center; color: var(--primary);" id="streakVal">0</div>
            </div>

            <div class="streak-card">
                <h3>Продолжай! 🔥</h3>
                <p style="margin: 0; font-size: 14px;">Выполняй все задачи каждый день</p>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-mMXLdI4rkEzmhLIi5dMhVmJY8ULGl18",
        authDomain: "myplanner-57c05.firebaseapp.com",
        projectId: "myplanner-57c05",
        storageBucket: "myplanner-57c05.firebasestorage.app",
        messagingSenderId: "135786783705",
        appId: "1:135786783705:web:6441c0a6545ebe1ee0efc8",
        measurementId: "G-PHMYDC3VEQ"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let user = null;
    let tasks = [];
    let selectedDay = new Date().getDay();
    let settings = {
        darkTheme: false,
        streak: 0,
        lastCompletedDay: null
    };

    const daysNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => {
            alert('Ошибка входа: ' + err.message);
        });
    }

    function logout() {
        auth.signOut();
    }

    auth.onAuthStateChanged(u => {
        if (u) {
            user = u;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userImg').src = u.photoURL;
            document.getElementById('userName').textContent = u.displayName.split(' ')[0];
            loadData();
        } else {
            user = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    });

    function loadData() {
        if (!user) return;

        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                if (data.tasks) tasks = data.tasks;
                if (data.settings) settings = { ...settings, ...data.settings };
                applySettings();
                render();
            } else {
                saveData();
            }
        });
    }

    function saveData() {
        if (!user) return;
        db.collection("users").doc(user.uid).set({ tasks, settings }, { merge: true });
    }

    function addTask() {
        const text = document.getElementById('taskInput').value.trim();
        const time = document.getElementById('timeInput').value;

        if (!text) return;

        tasks.push({
            id: Date.now().toString(),
            text,
            time,
            day: selectedDay,
            done: false
        });

        document.getElementById('taskInput').value = '';
        document.getElementById('timeInput').value = '';

        saveData();
        render();
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.done = !task.done;
            updateStreak();
            saveData();
            render();
        }
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveData();
        render();
    }

    function updateStreak() {
        const today = new Date().toISOString().split('T')[0];
        const todayTasks = tasks.filter(t => t.day === new Date().getDay());
        const allDone = todayTasks.length > 0 && todayTasks.every(t => t.done);

        if (allDone && settings.lastCompletedDay !== today) {
            settings.streak++;
            settings.lastCompletedDay = today;
            saveData();
        }
    }

    function openSettings() {
        document.getElementById('settingsModal').classList.add('active');
        updateSettingsUI();
    }

    function closeSettings() {
        document.getElementById('settingsModal').classList.remove('active');
    }

    function toggleTheme() {
        settings.darkTheme = !settings.darkTheme;
        applySettings();
        saveData();
    }

    function applySettings() {
        const theme = settings.darkTheme ? 'dark' : 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeToggle').classList.toggle('active', settings.darkTheme);
    }

    function updateSettingsUI() {
        document.getElementById('themeToggle').classList.toggle('active', settings.darkTheme);
    }

    function render() {
        renderDays();
        renderTasks();
        renderStats();
    }

    function renderDays() {
        const container = document.getElementById('daysContainer');
        container.innerHTML = '';

        daysNames.forEach((name, i) => {
            const count = tasks.filter(t => t.day === i && !t.done).length;
            const btn = document.createElement('button');
            btn.className = 'day-btn' + (i === selectedDay ? ' active' : '');
            btn.innerHTML = `${name}<small>${count}</small>`;
            btn.onclick = () => {
                selectedDay = i;
                render();
            };
            container.appendChild(btn);
        });
    }

    function renderTasks() {
        const container = document.getElementById('tasksList');
        const dayTasks = tasks
            .filter(t => t.day === selectedDay)
            .sort((a, b) => (a.time > b.time ? 1 : -1));

        if (dayTasks.length === 0) {
            container.innerHTML = '<div class="empty"><div class="empty-icon">✨</div><p>Нет задач</p></div>';
            return;
        }

        container.innerHTML = dayTasks.map(t => `
            <div class="task ${t.done ? 'done' : ''}">
                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')">
                <div class="task-content">
                    <span class="task-text">${t.text}</span>
                    ${t.time ? `<div class="task-time">⏰ ${t.time}</div>` : ''}
                </div>
                <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
            </div>
        `).join('');
    }

    function renderStats() {
        const dayTasks = tasks.filter(t => t.day === selectedDay);
        const done = dayTasks.filter(t => t.done).length;
        const total = dayTasks.length;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);

        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('totalCount').textContent = total;
        document.getElementById('doneCount').textContent = done;
        document.getElementById('streakVal').textContent = settings.streak;
    }

    applySettings();
</script>

</body>
</html>
